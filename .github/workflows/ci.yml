name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace @regulatory-ai/web
      - run: npm run build --workspace @regulatory-ai/web

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m ruff check backend tests
      - run: python -m pytest
      - run: python -m backend.tools.compile_check
